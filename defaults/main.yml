---
# defaults file for nextcloud

# Timezone for Nextcloud (e.g. "UTC", "Europe/Berlin", etc.)
nextcloud_timezone: UTC

# Version tag for the Nextcloud Docker image from linuxserver.io
nextcloud_version: 33.0.2-ls425

# External HTTP port to expose Nextcloud
nextcloud_http_port: 7070

# External HTTPS port to expose Nextcloud
nextcloud_https_port: 7071

# Path to the Nextcloud data volume on the host
nextcloud_data_volume: "{{ nextcloud_host_volume }}/data"

# Trusted domains for Nextcloud (should match the URLs used to access Nextcloud)
# by default, the inventory hostname, ansible_host, and localhost are included as trusted domains
# examples: nextcloud.homelab.local, nextcloud*,
nextcloud_trusted_domains: []

# Admin password for the initial Nextcloud setup
# Use ansible vault to encrypt this variable in production environments
nextcloud_admin_password: admin

# Enable or disable password policy (checking password strength, etc.)
nextcloud_password_policy_enabled: false

# List of additional Nextcloud users to create
# Use ansible vault to encrypt the passwords for these users in production environments
# If 'nextcloud_password_policy_enabled' is true, password needs to be at least 10 characters long
nextcloud_users:
  - username: john
    password: pass123
    display_name: John Smith
    email: john@example.com

# List of Nextcloud apps to enable by default
nextcloud_applications:
  activity: false
  calendar: false
  circles: true
  comments: false
  contacts: false
  dashboard: false
  deck: false
  files_downloadlimit: true
  files_pdfviewer: true
  files_reminders: true
  firstrunwizard: true
  logreader: true
  mail: false # required SMTP server to be configured
  nextcloud_announcements: true
  notes: false
  photos: false
  profile: true
  recommendations: true
  related_resources: true
  serverinfo: true
  sharebymail: true
  support: true
  survey_client: true
  tasks: false
  text: true
  theming: true
  user_status: true
  viewer: true
  weather_status: true
  webhook_listeners: true

# SMTP server hostname or IP address used by Nextcloud to send emails.
nextcloud_smtp_host: "smtp.example.com"

# SMTP port number. Common values: 587 (TLS), 465 (SSL), 25 (plain).
nextcloud_smtp_port: "587"

# Encryption method for SMTP: "tls", "ssl", or "none".
nextcloud_smtp_encryption: "tls"

# Username for authenticating to the SMTP server (usually an email address).
nextcloud_smtp_user: "user@example.com"

# Password for the SMTP user account.
nextcloud_smtp_password: "yourpassword"

# Local part of the "From" email address (before the @ symbol).
# Example: "no-reply" → no-reply@example.com
nextcloud_smtp_from_address: "no-reply"

# Domain part of the "From" email address (after the @ symbol).
nextcloud_smtp_domain: "example.com"

# Database type for Nextcloud: sqlite3 (SQLite3), mysql (MariaDB), pgsql (PostgreSQL)
nextcloud_db_type: mysql

# Version tag for the MariaDB Docker image from linuxserver.io
# if 'nextcloud_db_type' is set to 'mysql'
nextcloud_mariadb_version: 11.4.9-r0-ls212

# Version tag for the PostgreSQL Docker image from hub.docker.com/_/postgres
# if 'nextcloud_db_type' is set to 'pgsql'
nextcloud_postgres_version: 14.22-trixie

# Name of database
nextcloud_db_name: database

# External port to expose database service (MariaDB or PostgreSQL)
nextcloud_db_port: 3306

# Username for MariaDB database
nextcloud_db_username: nextcloud

# Password for the MariaDB database user
# Use ansible vault to encrypt this variable in production environments
nextcloud_db_password: dbpass123

# Root password for the MariaDB database
# Use ansible vault to encrypt this variable in production environments
nextcloud_db_root_password: mysecretrootpassword

# Version tag for the Redis image from docker.io
nextcloud_redis_version: 8.4.2-alpine3.22

# Port to expose Redis
nextcloud_redis_port: 6379
